name: Lint & Test

on:
  pull_request:
    branches:
      - dev
      - staging
      - main

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [16.x]
    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
  
    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint

    - name: Run test
      run: npm run test

    - name: Build App
      run: npm run build
